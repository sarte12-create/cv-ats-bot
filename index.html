<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV ATS Bot</title>
    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>

<body>
    <div class="app-container">
        <!-- Progress Bar -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div id="toast-container"></div>

        <form id="cv-form">
            <!-- Step 1: CV Type -->
            <div class="step active" id="step-1">
                <h2>نوع السيرة الذاتية</h2>
                <div class="radio-group">
                    <label class="radio-card"><input type="radio" name="cvType" value="fresh" checked> <span>طالب / حديث تخرج 🎓</span></label>
                    <label class="radio-card"><input type="radio" name="cvType" value="experienced"> <span>صاحب خبرة 💼</span></label>
                </div>
            </div>

            <!-- Step 2: Template -->
            <div class="step" id="step-2">
                <h2>اختر تصميم السيرة الذاتية</h2>
                <div class="radio-group">
                    <label class="radio-card"><input type="radio" name="cvTemplate" value="tpl1" checked> <span>النموذج 1 (كلاسيكي رسمي) 📄</span></label>
                    <label class="radio-card"><input type="radio" name="cvTemplate" value="tpl2"> <span>النموذج 2 (عصري بخطوط جانبية) 📑</span></label>
                    <label class="radio-card"><input type="radio" name="cvTemplate" value="tpl3"> <span>النموذج 3 (بسيط ومدمج) 📋</span></label>
                </div>
            </div>

            <!-- Step 3: Language -->
            <div class="step" id="step-3">
                <h2>لغة السيرة الذاتية</h2>
                <div class="radio-group">
                    <label class="radio-card"><input type="radio" name="language" value="ar" checked> <span>عربي 🇸🇦</span></label>
                    <label class="radio-card"><input type="radio" name="language" value="en"> <span>إنجليزي 🇺🇸</span></label>
                </div>
            </div>

            <!-- Step 4: Personal -->
            <div class="step" id="step-4">
                <h2>البيانات الشخصية</h2>
                <div class="form-group"><label>الاسم الكامل</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="email"></div>
                <div class="form-group"><label>رقم الجوال</label><input type="tel" id="phone"></div>
                <div class="form-group"><label>المدينة/الدولة</label><input type="text" id="location"></div>
            </div>

            <!-- Step 5: Summary -->
            <div class="step" id="step-5">
                <h2>النبذة والمسمى</h2>
                <div class="form-group"><label>المسمى الوظيفي</label><input type="text" id="jobTitle" required placeholder="مثال: مبرمج واجهات، مهندس شبكات..."></div>
                <div class="form-group">
                    <label>النبذة (اختياري يمكنك تخطيها للذكاء الاصطناعي لاحقاً)</label>
                    <textarea id="summary" rows="4"></textarea>
                </div>
            </div>

            <!-- Step 6: Experience -->
            <div class="step" id="step-6">
                <h2>الخبرات المهنية</h2>
                <div id="experiences-list"></div>
                <button type="button" class="btn btn-secondary" onclick="addExperience()">+ إضافة خبرة</button>
            </div>

            <template id="tpl-experience">
                <div class="dynamic-item">
                    <div class="form-group"><label>المسمى</label><input type="text" class="exp-title"></div>
                    <div class="form-group"><label>جهة العمل</label><input type="text" class="exp-company"></div>
                    <div class="form-group row">
                        <div class="col"><label>من</label><input type="text" class="exp-start"></div>
                        <div class="col"><label>إلى</label><input type="text" class="exp-end"></div>
                    </div>
                    <div class="form-group"><label>المهام (اختياري)</label><textarea class="exp-desc" rows="4"></textarea></div>
                    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
                </div>
            </template>

            <!-- Step 7: Education -->
            <div class="step" id="step-7">
                <h2>التعليم والمؤهلات</h2>
                <div id="education-list"></div>
                <button type="button" class="btn btn-secondary" onclick="addEducation()">+ إضافة مؤهل</button>
            </div>

            <template id="tpl-education">
                <div class="dynamic-item">
                    <div class="form-group"><label>الدرجة العلمية</label><input type="text" class="edu-degree"></div>
                    <div class="form-group"><label>التخصص</label><input type="text" class="edu-field"></div>
                    <div class="form-group row">
                        <div class="col"><label>المؤسسة</label><input type="text" class="edu-inst"></div>
                        <div class="col"><label>سنة التخرج</label><input type="text" class="edu-year"></div>
                    </div>
                    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
                </div>
            </template>

            <!-- Step 8: Courses -->
            <div class="step" id="step-8">
                <h2>الدورات التدريبية</h2>
                <div id="courses-list"></div>
                <button type="button" class="btn btn-secondary" onclick="addCourse()">+ إضافة دورة (اختياري)</button>
            </div>

            <template id="tpl-course">
                <div class="dynamic-item">
                    <div class="form-group"><label>اسم الدورة</label><input type="text" class="course-name"></div>
                    <div class="form-group row">
                        <div class="col"><label>الجهة المانحة</label><input type="text" class="course-inst"></div>
                        <div class="col"><label>السنة</label><input type="text" class="course-year"></div>
                    </div>
                    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
                </div>
            </template>

            <!-- Step 9: Skills -->
            <div class="step" id="step-9">
                <h2>المهارات</h2>
                <div class="form-group mt-3">
                    <label>اكتب مهاراتك (اختياري)</label>
                    <textarea id="skills" rows="4" placeholder="قيادة، برمجة (مفصولة بفاصلة)"></textarea>
                </div>
            </div>

            <!-- Step 10: Languages -->
            <div class="step" id="step-10">
                <h2>اللغات</h2>
                <div id="languages-list"></div>
                <button type="button" class="btn btn-secondary" onclick="addLanguage()">+ إضافة لغة</button>
            </div>

            <template id="tpl-language">
                <div class="dynamic-item row" style="align-items: center">
                    <div class="col" style="flex:2"><input type="text" class="lang-name" placeholder="اللغة"></div>
                    <div class="col" style="flex:1"><input type="text" class="lang-level" placeholder="المستوى"></div>
                    <button type="button" class="btn-remove" style="position:static" onclick="this.closest('.dynamic-item').remove()">X</button>
                </div>
            </template>

            <!-- Step 11: AI Review -->
            <div class="step" id="step-11">
                <h2>المراجعة الذكية للنواقص</h2>
                <div id="review-content"></div>
            </div>

            <!-- Step 12: Export -->
            <div class="step" id="step-12">
                <h2>المعاينة والتصدير</h2>
                <p>لقد صممت سيرتك الذاتية بنجاح! اضغط أدناه لتحميلها كملف PDF:</p>
                <div class="export-options" style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
                    <button type="button" class="btn btn-primary" onclick="generateAndSendPDF(false)">
                        📥 تحميل السيرة الذاتية (مجاناً)
                    </button>
                </div>
                <div id="export-status" class="status-box" style="margin-top:15px; text-align:center; display:none;">
                </div>
            </div>
        </form>

        <div class="nav-buttons">
            <button class="btn btn-secondary" type="button" id="btn-prev" onclick="nav(-1)" style="display:none;">السابق</button>
            <button class="btn btn-primary" type="button" id="btn-next" onclick="nav(1)">التالي</button>
        </div>
    </div>

    <!-- Hidden Output -->
    <div id="pdf-wrapper">
        <div id="pdf-container"></div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
